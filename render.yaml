databases:
  - name: study-partner-db
    databaseName: study_partner
    user: study_partner_user
    plan: free

services:
  - type: web
    name: study-partner-app
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: daphne -b 0.0.0.0 -p $PORT study_partner_backend.asgi:application
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: study-partner-app.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: study-partner-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: study-partner-redis
          property: connectionString

  - type: redis
    name: study-partner-redis
    plan: free
    ipAllowList: [] # Limits access exclusively to the internal network for security
